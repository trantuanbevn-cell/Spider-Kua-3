<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider-Kua</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090f;--s1:#0d1117;--s2:#161b27;--s3:#1e2535;
  --bd:#2a3347;--bd2:#3a4560;
  --tx:#e8eaf0;--tx2:#8a94b0;--tx3:#4a5570;
  --red:#e8192c;--red2:#ff3347;
  --blue:#0f4c8f;--blue2:#1a6abf;
  --gold:#f5c842;--green:#30d158;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'Nunito',sans-serif;font-size:14px;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 15% 20%,rgba(15,76,143,.2) 0%,transparent 50%),radial-gradient(circle at 85% 80%,rgba(232,25,44,.12) 0%,transparent 50%);pointer-events:none;z-index:0;}

/* ═══ SPLASH SCREEN CỐ ĐỊNH 3 VÙNG ═══ */
#splash{
  position:fixed;inset:0;background:#000;z-index:9999;
  display:flex;flex-direction:column;align-items:center;
  justify-content:space-between; 
  padding:80px 0;
  overflow:hidden;cursor:pointer;
}
#splash.hide{animation:splashOut .6s ease forwards;}
@keyframes splashOut{to{opacity:0;transform:scale(1.05);visibility:hidden;}}

/* Vùng 1: Avengers */
.av-top{display:flex;flex-direction:column;align-items:center;}
.av-ring{
  width:140px;height:140px;border-radius:50%;border:4px solid #c0a060;
  display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 0 30px rgba(192,160,96,0.3);
}
.av-a{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:90px;color:#c0a060;line-height:1;}
.av-sub{font-family:'Rajdhani',sans-serif;font-size:16px;letter-spacing:.5em;color:#8a7040;text-transform:uppercase;margin-top:12px;}

/* Vùng 2: Center */
.info-center{display:flex;flex-direction:column;align-items:center;gap:12px;}
.wel-txt{font-family:'Rajdhani',sans-serif;font-size:14px;letter-spacing:.6em;color:rgba(255,255,255,0.7);text-transform:uppercase;}
.name-txt{font-family:'Rajdhani',sans-serif;font-size:52px;font-weight:700;letter-spacing:.1em;color:#e8192c;line-height:1;text-shadow:0 0 20px rgba(232,25,44,0.5);}
.shield-txt{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;letter-spacing:.15em;color:#f5c842;min-height:1.5em;}

/* Vùng 3: Logo Mới */
.spider-bottom{display:flex;flex-direction:column;align-items:center;gap:20px;}
.spider-btn{
  width:140px;height:140px;border-radius:50%;background:#c0101e;border:3px solid #e8192c;
  display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(232,25,44,0.5);
  transition: transform 0.2s;
}
.spider-btn:active{transform:scale(0.9);}
.spider-img{width:90%;height:90%;object-fit:contain;filter:drop-shadow(0 0 15px rgba(232,25,44,0.8));}
.tap-txt{font-family:'Rajdhani',sans-serif;font-size:12px;color:rgba(255,255,255,0.3);letter-spacing:.3em;text-transform:uppercase;animation:blink 1.8s infinite;}

@keyframes blink{0%,100%{opacity:.4;}50%{opacity:1;}}

/* ═══ GIỮ NGUYÊN APP CLAUDE ═══ */
#app{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:0 14px;height:100vh;flex-direction:column;display:none;}
.hdr{display:flex;align-items:center;gap:10px;padding:10px 0 8px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.hlogo{width:38px;height:38px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid var(--blue2);}
.htitle{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;}
.htitle span{color:var(--red);}
.xpw{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.xpl{font-size:11px;color:var(--gold);font-family:'Rajdhani',sans-serif;font-weight:700;}
.xpb{width:90px;height:4px;background:var(--s3);border-radius:2px;overflow:hidden;}
.xpf{height:100%;background:var(--gold);border-radius:2px;transition:width .8s;}
.msgs{flex:1;overflow-y:auto;padding:12px 0;display:flex;flex-direction:column;gap:10px;}
.mb{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.7;background:var(--s2);border:1px solid var(--bd);}
.msg.user .mb{background:var(--blue);color:#fff;}
</style>
</head>
<body>

<div id="splash" onclick="hideSplash()">
  <div class="av-top">
    <div class="av-ring"><span class="av-a">A</span></div>
    <div class="av-sub">THE AVENGERS</div>
  </div>

  <div class="info-center">
    <div class="wel-txt">WELCOME</div>
    <div class="name-txt">SPIDER-KUA</div>
    <div id="sloganTxt" class="shield-txt"></div>
  </div>

  <div class="spider-bottom">
    <div class="spider-btn">
      <img src="https://raw.githubusercontent.com/trantuanbevn-cell/Spider-Kua-3/main/Spider-Man-Logo-PNG-Isolated-HD.png" class="spider-img" alt="Spider Logo">
    </div>
    <div class="tap-txt">TAP TO BEGIN</div>
  </div>
</div>

<div id="setup" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:100;align-items:center;justify-content:center;padding:20px;">
  <div style="background:var(--s1);padding:30px;border-radius:20px;border:1px solid var(--bd2);width:100%;max-width:400px;text-align:center;">
    <div style="font-size:50px;">🕷️</div>
    <div style="font-family:Rajdhani;font-size:22px;color:var(--gold);margin-bottom:20px;">DÁN API KEY VÀO ĐÂY</div>
    <textarea id="gemTA" style="width:100%;background:#000;color:#fff;border-radius:10px;padding:10px;height:80px;"></textarea>
    <button onclick="activate()" style="width:100%;background:var(--red);color:#fff;border:none;border-radius:12px;padding:15px;margin-top:15px;cursor:pointer;font-weight:700;">🔓 KÍCH HOẠT</button>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hlogo">🛡️</div>
    <div style="flex:1"><div class="htitle">SPIDER-<span>KUA</span></div></div>
    <div class="xpw"><div class="xpl" id="xpLbl">⚡ 0XP</div><div class="xpb"><div class="xpf" id="xpFill"></div></div></div>
  </div>
  <div id="msgs" class="msgs"></div>
  <div style="padding:15px 0;display:flex;gap:10px;">
    <input type="text" id="txtIn" style="flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:20px;color:#fff;padding:10px 20px;outline:none;" placeholder="Báo cáo Fury...">
    <button onclick="doSend()" style="background:var(--red);border:none;width:40px;height:40px;border-radius:50%;color:#fff;cursor:pointer;">➤</button>
  </div>
</div>

<script>
const K={api:'sk3',gem:'gem3',mem:'mem3',xu:'xu3'};
let gemKey='', busy=false;

/* ══ LOGIC SLOGAN CHUẨN ══ */
const SLOGAN_TEXT = "Shield Systems Online. Standing by!";
const SLOGAN_VOICE = "Shield systems online. Standing by!";

function animateSlogan(){
  const el = document.getElementById('sloganTxt');
  if(!el) return;
  el.textContent = '';
  let j = 0;
  const interval = setInterval(() => {
    if(j < SLOGAN_TEXT.length){ el.textContent += SLOGAN_TEXT[j]; j++; }
    else { clearInterval(interval); playVoice(); }
  }, 50);
}

function playVoice(){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(SLOGAN_VOICE);
  u.lang = 'en-US'; u.rate = 0.85; u.pitch = 0.65;
  window.speechSynthesis.speak(u);
}

function hideSplash(){
  window.speechSynthesis.cancel();
  document.getElementById('splash').classList.add('hide');
  setTimeout(() => {
    document.getElementById('splash').remove();
    const g = localStorage.getItem(K.gem);
    if(g){ gemKey=g; boot(); }
    else { document.getElementById('setup').style.display='flex'; }
  }, 600);
}

function boot(){
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='flex';
  updateUI();
  addAIMsg("Chào Agent Parker! Anh Fury đây. Hệ thống đã sẵn sàng.");
}

function activate(){
  const val = document.getElementById('gemTA').value.trim();
  if(val){ localStorage.setItem(K.gem, val); gemKey=val; boot(); }
}

function updateUI(){
  const m = JSON.parse(localStorage.getItem(K.mem)||'{"xp":0}');
  document.getElementById('xpLbl').textContent=`⚡ ${m.xp}XP`;
  document.getElementById('xpFill').style.width=(m.xp%100)+'%';
}

function addAIMsg(t){
  const ms = document.getElementById('msgs');
  const d = document.createElement('div'); d.className='msg';
  d.innerHTML=`<div class="mb">${t}</div>`;
  ms.appendChild(d); ms.scrollTop=ms.scrollHeight;
}

function doSend(){
  const i = document.getElementById('txtIn'), t = i.value.trim();
  if(!t || busy) return;
  i.value = ''; busy = true;
  setTimeout(() => { addAIMsg("Fury đã nhận báo cáo."); busy = false; }, 1000);
}

window.onload = () => { setTimeout(animateSlogan, 800); };
</script>
</body>
</html>
