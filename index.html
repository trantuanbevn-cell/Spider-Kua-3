<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider-Kua</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090f;--s1:#0d1117;--s2:#161b27;--s3:#1e2535;
  --bd:#2a3347;--bd2:#3a4560;
  --tx:#e8eaf0;--tx2:#8a94b0;--tx3:#4a5570;
  --red:#e8192c;--red2:#ff3347;
  --blue:#0f4c8f;--blue2:#1a6abf;
  --gold:#f5c842;--green:#30d158;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'Nunito',sans-serif;font-size:14px;min-height:100vh;overflow:hidden;}

/* SPLASH SCREEN - FIX LỖI HIỂN THỊ */
#splash{
  position:fixed;inset:0;background:#000;z-index:9999;
  display:flex;flex-direction:column;align-items:center;
  justify-content:space-around;padding:60px 0;text-align:center;cursor:pointer;
}
#splash.hide{display:none;}

.av-ring{width:130px;height:130px;border-radius:50%;border:3px solid #c0a060;display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(192,160,96,0.3);}
.av-a{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:80px;color:#c0a060;}

.name-txt{font-family:'Rajdhani',sans-serif;font-size:48px;font-weight:700;color:var(--red);text-shadow:0 0 20px rgba(232,25,44,0.5);}
.shield-txt{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;color:var(--gold);min-height:1.2em;}

.spider-btn{width:140px;height:140px;display:flex;align-items:center;justify-content:center;}
.spider-img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 15px var(--red));}

/* APP UI */
#app{display:none;max-width:860px;margin:0 auto;padding:0 14px;height:100vh;flex-direction:column;}
.hdr{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd);}
.hlogo{width:38px;height:38px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid var(--blue2);}
.htitle{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;}
.htitle span{color:var(--red);}
.msgs{flex:1;overflow-y:auto;padding:12px 0;display:flex;flex-direction:column;gap:10px;}
.mb{padding:10px 14px;border-radius:14px;background:var(--s2);border:1px solid var(--bd);max-width:85%;}
.msg.user{align-self:flex-end;} .msg.user .mb{background:var(--blue);color:#fff;}
.ipa{padding:10px 0;border-top:1px solid var(--bd);}
.irow{display:flex;gap:8px;}
.ibox{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:20px;padding:10px 15px;}
.ibox textarea{width:100%;background:transparent;border:none;outline:none;color:#fff;resize:none;}
.abtn{width:40px;height:40px;border-radius:50%;border:none;background:var(--red);color:#fff;cursor:pointer;}
</style>
</head>
<body>

<div id="splash" onclick="hideSplash()">
  <div class="av-zone">
    <div class="av-ring"><span class="av-a">A</span></div>
    <div style="font-family:Rajdhani;font-size:14px;letter-spacing:.4em;color:#8a7040;margin-top:10px;">THE AVENGERS</div>
  </div>
  <div class="info-zone">
    <div style="font-family:Rajdhani;font-size:12px;letter-spacing:.5em;color:rgba(255,255,255,0.5);">WELCOME</div>
    <div class="name-txt">SPIDER-KUA</div>
    <div id="sloganTxt" class="shield-txt"></div>
  </div>
  <div class="spider-zone">
    <div class="spider-btn">
      <img src="https://raw.githubusercontent.com/trantuanbevn-cell/Spider-Kua-3/main/Spider-Man-Logo-PNG-Isolated-HD.png" class="spider-img">
    </div>
    <div style="font-family:Rajdhani;font-size:11px;letter-spacing:.3em;color:rgba(255,255,255,0.2);margin-top:15px;">TAP TO BEGIN</div>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hlogo">🛡️</div>
    <div style="flex:1"><div class="htitle">SPIDER-<span>KUA</span></div></div>
    <button onclick="localStorage.removeItem('gem_k');location.reload()" style="font-size:10px;background:var(--red);color:#fff;border:none;padding:4px 8px;border-radius:4px;">RESET KEY</button>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="ipa">
    <div class="irow">
      <div class="ibox"><textarea id="txtIn" rows="1" placeholder="Báo cáo Fury..."></textarea></div>
      <button class="abtn" onclick="doSend()">➤</button>
    </div>
  </div>
</div>

<script>
const SLOGAN = "Shield Systems Online. Standing by!";
const VOICE_SLOGAN = "Shield systems online. Standing by!";

function animateSlogan(){
  const el = document.getElementById('sloganTxt');
  let j = 0;
  const interval = setInterval(() => {
    if(j < SLOGAN.length){ el.textContent += SLOGAN[j]; j++; }
    else { clearInterval(interval); playVoice(); }
  }, 50);
}

function playVoice(){
  if(!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(VOICE_SLOGAN);
  u.lang = 'en-US'; u.rate = 0.8; u.pitch = 0.7;
  window.speechSynthesis.speak(u);
}

function hideSplash(){
  document.getElementById('splash').classList.add('hide');
  const key = localStorage.getItem('gem_k');
  if(key) boot(); 
  else {
    const k = prompt("Nhập Gemini API Key:");
    if(k) { localStorage.setItem('gem_k', k); boot(); }
  }
}

function boot(){
  document.getElementById('app').style.display = 'flex';
  addAIMsg("Hệ thống S.H.I.E.L.D. đã sẵn sàng, Agent Parker!");
}

function addAIMsg(t){
  const m = document.getElementById('msgs');
  const d = document.createElement('div'); d.className='msg ai';
  d.innerHTML=`<div class="mb">${t}</div>`;
  m.appendChild(d); m.scrollTop=m.scrollHeight;
}

function doSend(){
  const i = document.getElementById('txtIn');
  if(!i.value.trim()) return;
  const d = document.createElement('div'); d.className='msg user';
  d.innerHTML=`<div class="mb">${i.value}</div>`;
  document.getElementById('msgs').appendChild(d);
  i.value = '';
  setTimeout(() => addAIMsg("Fury đã nhận báo cáo."), 1000);
}

window.onload = () => { setTimeout(animateSlogan, 500); };
</script>
</body>
</html>
