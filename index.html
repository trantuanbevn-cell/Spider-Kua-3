<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider-Kua v3 | S.H.I.E.L.D. Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090f;--s1:#0d1117;--s2:#161b27;--s3:#1e2535;
  --bd:#2a3347;--bd2:#3a4560;
  --tx:#e8eaf0;--tx2:#8a94b0;--tx3:#4a5570;
  --red:#e8192c;--red2:#ff3347;
  --blue:#0f4c8f;--blue2:#1a6abf;
  --gold:#f5c842;--green:#30d158;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'Nunito',sans-serif;font-size:14px;min-height:100vh;overflow:hidden;}

/* SPLASH SCREEN - CÂN CHỈNH 3 VÙNG DỌC */
#splash{
  position:fixed;inset:0;background:var(--bg);z-index:9999;
  display:flex;flex-direction:column;align-items:center;
  justify-content:space-evenly; 
  padding:50px 0;text-align:center;
}
#splash.hide{animation:splashOut .6s ease forwards;}
@keyframes splashOut{to{opacity:0;transform:scale(1.05);visibility:hidden;}}

/* Vùng 1: Avengers */
.av-zone{display:flex;flex-direction:column;align-items:center;}
.av-ring{
  width:110px;height:110px;border-radius:50%;border:2px solid #c0a060;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 25px rgba(192,160,96,0.3);position:relative;
}
.av-a{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:76px;color:#c0a060;line-height:1;}
.av-sub{font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:.5em;color:#8a7040;text-transform:uppercase;margin-top:12px;}

/* Vùng 2: Welcome (Cân đối 3 dòng) */
.info-zone{display:flex;flex-direction:column;gap:15px;align-items:center;}
.wel-txt{font-family:'Rajdhani',sans-serif;font-size:15px;letter-spacing:0.7em;color:rgba(255,255,255,0.5);text-transform:uppercase;}
.name-txt{font-family:'Rajdhani',sans-serif;font-size:50px;font-weight:700;letter-spacing:0.08em;color:var(--red);text-shadow:0 0 20px rgba(232,25,44,0.5);line-height:1;}
.shield-txt{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.18em;color:var(--gold);text-shadow:0 0 12px rgba(245,200,66,0.4);}

/* Vùng 3: Logo Nhện mới & Tap */
.spider-zone{display:flex;flex-direction:column;align-items:center;gap:25px;}
.spider-btn{
  width:150px;height:150px;cursor:pointer;transition:transform 0.3s;
  display:flex;align-items:center;justify-content:center;position:relative;
}
.spider-img{
  width:100%;height:100%;object-fit:contain;
  filter:drop-shadow(0 0 15px rgba(232,25,44,0.6));
  animation:spiderPulse 2s infinite ease-in-out;
}
.tap-txt{font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:0.4em;color:rgba(255,255,255,0.3);text-transform:uppercase;animation:blink 2s infinite;}

@keyframes spiderPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);filter:drop-shadow(0 0 25px rgba(232,25,44,0.8));}}
@keyframes blink{0%,100%{opacity:0.2;}50%{opacity:0.7;}}

/* PHẦN APP CHÍNH */
#app{display:none;flex-direction:column;height:100vh;padding:0 15px;}
#setup{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.sbox{background:var(--s1);border:1px solid var(--bd2);border-radius:20px;padding:30px;width:100%;max-width:400px;}
.sta{width:100%;background:var(--bg);border:1px solid var(--bd2);border-radius:10px;color:#fff;padding:12px;margin-bottom:15px;font-family:monospace;}
.sbtn{width:100%;background:var(--red);border:none;border-radius:12px;color:#fff;padding:15px;font-family:'Rajdhani',sans-serif;font-weight:700;cursor:pointer;}
</style>
</head>
<body>

<div id="splash">
  <div class="av-zone">
    <div class="av-ring"><span class="av-a">A</span></div>
    <div class="av-sub">THE AVENGERS</div>
  </div>

  <div class="info-zone">
    <div class="wel-txt">WELCOME</div>
    <div class="name-txt">SPIDER-KUA</div>
    <div class="shield-txt">SHIELD SYSTEMS ONLINE. STANDING BY!</div>
  </div>

  <div class="spider-zone">
    <div class="spider-btn" onclick="hideSplash()">
      <img src="https://raw.githubusercontent.com/trantuanbevn-cell/Spider-Kua-3/main/Spider-Man-Logo-PNG-Isolated-HD.png" class="spider-img" alt="Spider Logo">
    </div>
    <div class="tap-txt">TAP TO BEGIN</div>
  </div>
</div>

<div id="setup" style="display:none;">
  <div class="sbox">
    <div style="text-align:center;font-size:50px;margin-bottom:10px;">🕷️</div>
    <div style="font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--gold);text-align:center;margin-bottom:20px;">KÍCH HOẠT S.H.I.E.L.D.</div>
    <input type="text" class="sta" id="gemKey" placeholder="Dán Gemini API Key vào đây...">
    <button class="sbtn" onclick="activate()">🔓 UNLOCK SYSTEM</button>
  </div>
</div>

<div id="app">
  <div style="padding:15px 0; border-bottom:1px solid var(--bd); display:flex; justify-content:space-between; align-items:center;">
    <div style="font-family:'Rajdhani',sans-serif; font-weight:700; font-size:20px;">🛡️ SPIDER-<span>KUA</span></div>
    <div style="color:var(--gold); font-family:'Rajdhani',sans-serif; font-weight:700;">🪙 <span id="xuVal">0</span></div>
  </div>
  <div id="chat" style="flex:1; overflow-y:auto; padding:20px 0;"></div>
  <div style="padding:15px 0; display:flex; gap:10px;">
    <input type="text" id="msgIn" style="flex:1; background:var(--s2); border:1px solid var(--bd); border-radius:20px; color:#fff; padding:10px 20px; outline:none;" placeholder="Báo cáo Fury...">
    <button onclick="send()" style="background:var(--red); border:none; width:40px; height:40px; border-radius:50%; color:#fff; cursor:pointer;">➤</button>
  </div>
</div>

<script>
const K={api:'kua_key',xu:'kua_xu'};

function hideSplash(){
  document.getElementById('splash').classList.add('hide');
  setTimeout(() => {
    document.getElementById('splash').remove();
    const key = localStorage.getItem(K.api);
    if(key) boot(); else document.getElementById('setup').style.display='flex';
  }, 600);
}

function activate(){
  const k = document.getElementById('gemKey').value.trim();
  if(!k) return;
  localStorage.setItem(K.api, k);
  boot();
}

function boot(){
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('xuVal').textContent = localStorage.getItem(K.xu) || 0;
  addMsg('ai', 'Chào mừng Agent Parker trở lại. Hệ thống đã sẵn sàng cho nhiệm vụ tối nay!');
}

function addMsg(role, txt){
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.style.cssText = `margin-bottom:15px; padding:12px; border-radius:15px; max-width:85%; font-size:14px; line-height:1.5; ${role==='ai'?'background:var(--s2); border:1px solid var(--bd); align-self:flex-start;':'background:var(--blue); color:#fff; align-self:flex-end; margin-left:auto;'}`;
  div.textContent = txt;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function send(){
  const input = document.getElementById('msgIn');
  const txt = input.value.trim();
  if(!txt) return;
  addMsg('user', txt);
  input.value = '';
  setTimeout(()=> addMsg('ai', 'Fury đã nhận báo cáo. Đang xử lý...'), 1000);
}
</script>
</body>
</html>
