<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider-Kua v3 | S.H.I.E.L.D. Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090f;--s1:#0d1117;--s2:#161b27;--s3:#1e2535;
  --bd:#2a3347;--bd2:#3a4560;
  --tx:#e8eaf0;--tx2:#8a94b0;--tx3:#4a5570;
  --red:#e8192c;--red2:#ff3347;
  --blue:#0f4c8f;--blue2:#1a6abf;
  --gold:#f5c842;--green:#30d158;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'Nunito',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden;}

/* ═══ SPLASH SCREEN - OPTIMIZED BY GEMINI ═══ */
#splash{
  position:fixed;inset:0;background:#000;z-index:9999;
  display:flex;flex-direction:column;align-items:center;
  justify-content:space-around;padding:40px 0;
}
#splash.hide{animation:splashOut .6s ease forwards;}
@keyframes splashOut{to{opacity:0;transform:scale(1.05);visibility:hidden;}}

.av-ring{
  width:120px;height:120px;border-radius:50%;border:3px solid #c0a060;
  display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(192,160,96,0.3);
}
.av-a{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:80px;color:#c0a060;line-height:1;}

.info-zone{text-align:center; display:flex; flex-direction:column; gap:12px;}
.wel-txt{font-family:'Rajdhani',sans-serif;font-size:15px;letter-spacing:0.6em;color:rgba(255,255,255,0.5);text-transform:uppercase;}
.name-txt{font-family:'Rajdhani',sans-serif;font-size:48px;font-weight:700;letter-spacing:0.1em;color:var(--red);text-shadow:0 0 20px rgba(232,25,44,0.5);}
.shield-txt{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.15em;color:var(--gold);min-height:1.2em;}

.spider-btn{
  width:150px;height:150px;cursor:pointer;transition:transform 0.3s;
  display:flex;align-items:center;justify-content:center;position:relative;
}
.spider-img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 15px rgba(232,25,44,0.6));animation:pulse 2s infinite;}

@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
@keyframes blink{0%,100%{opacity:0.2;}50%{opacity:0.7;}}

/* ═══ CORE INTERFACE (CLAUDE ORIGINAL RECOVERED) ═══ */
#app{display:none;max-width:860px;margin:0 auto;padding:0 14px;height:100vh;flex-direction:column;position:relative;z-index:1;}
.hdr{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd);flex-shrink:0;}
.hlogo{width:38px;height:38px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid var(--blue2);}
.htitle{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;}
.htitle span{color:var(--red);}
.stats{display:flex;gap:6px;padding:6px 0;border-bottom:1px solid var(--bd);overflow-x:auto;}
.chip{background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:4px 10px;font-size:11px;display:flex;align-items:center;gap:5px;font-family:'Rajdhani',sans-serif;font-weight:600;}
.msgs{flex:1;overflow-y:auto;padding:12px 0;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:8px;max-width:85%;animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}}
.msg.ai{align-self:flex-start;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.mb{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.6;}
.msg.ai .mb{background:var(--s2);border:1px solid var(--bd);border-top-left-radius:2px;}
.msg.user .mb{background:var(--blue);color:#fff;border-top-right-radius:2px;}

.ipa{padding:10px 0;border-top:1px solid var(--bd);flex-shrink:0;}
.quick{display:flex;gap:5px;flex-wrap:wrap;padding-bottom:10px;}
.qbtn{background:var(--s2);border:1px solid var(--bd);border-radius:14px;color:var(--tx2);font-size:11px;padding:4px 10px;cursor:pointer;}
.irow{display:flex;gap:8px;align-items:flex-end;}
.ibox{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:20px;padding:0 14px;}
.ibox textarea{width:100%;background:transparent;border:none;outline:none;color:var(--tx);padding:10px 0;resize:none;max-height:80px;}
.abtn{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}
.abtn.send{background:var(--red);color:#fff;}
.abtn.img{background:var(--s3);color:var(--tx2);}

#setup{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.sbox{background:var(--s1);border:1px solid var(--bd2);border-radius:20px;padding:30px;width:100%;max-width:400px;}
.sta{width:100%;background:var(--bg);border:1px solid var(--bd2);border-radius:10px;color:#fff;padding:12px;margin-bottom:15px;font-family:monospace;}
.sbtn{width:100%;background:var(--red);border:none;border-radius:12px;color:#fff;padding:15px;font-family:'Rajdhani',sans-serif;font-weight:700;cursor:pointer;}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;align-items:center;justify-content:center;padding:20px;}
.obox{background:var(--s1);border:1px solid var(--bd2);border-radius:18px;padding:22px;max-width:420px;width:100%;}
</style>
</head>
<body>

<div id="splash">
  <div class="av-zone" style="display:flex;flex-direction:column;align-items:center;">
    <div class="av-ring"><span class="av-a">A</span></div>
    <div style="font-family:'Rajdhani',sans-serif;font-size:14px;letter-spacing:.5em;color:#8a7040;text-transform:uppercase;margin-top:15px;">THE AVENGERS</div>
  </div>

  <div class="info-zone">
    <div class="wel-txt">WELCOME</div>
    <div class="name-txt">SPIDER-KUA</div>
    <div id="sloganTxt" class="shield-txt"></div>
  </div>

  <div class="spider-zone" style="display:flex;flex-direction:column;align-items:center;gap:20px;">
    <div class="spider-btn" onclick="hideSplash()">
      <img src="https://raw.githubusercontent.com/trantuanbevn-cell/Spider-Kua-3/main/Spider-Man-Logo-PNG-Isolated-HD.png" class="spider-img" alt="Spider Logo">
    </div>
    <div style="font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:0.4em;color:rgba(255,255,255,0.3);text-transform:uppercase;animation:blink 2s infinite;">TAP TO BEGIN</div>
  </div>
</div>

<div id="setup" style="display:none;">
  <div class="sbox">
    <div style="text-align:center;font-size:50px;margin-bottom:10px;">🕷️</div>
    <div style="font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--gold);text-align:center;margin-bottom:20px;">KÍCH HOẠT S.H.I.E.L.D.</div>
    <textarea class="sta" id="gemTA" placeholder="Dán Gemini API Key vào đây..."></textarea>
    <button class="sbtn" onclick="activate()">🔓 UNLOCK SYSTEM</button>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hlogo">🛡️</div>
    <div style="flex:1">
      <div class="htitle">SPIDER-<span>KUA</span></div>
    </div>
    <div class="chip" style="color:var(--gold); cursor:pointer;" onclick="showShop()">🪙 <span id="xuVal">0</span></div>
    <button onclick="showParent()" style="background:none;border:none;font-size:18px;cursor:pointer;">👩</button>
  </div>

  <div class="stats">
    <div class="chip">🔥 <span id="sStreak">0</span> Ngày</div>
    <div class="chip">🕸️ <span id="sMission">0</span> Mission</div>
    <div class="chip" style="margin-left:auto;color:var(--gold);" id="roomID">—</div>
  </div>

  <div class="msgs" id="msgs"></div>

  <div class="ipa">
    <div class="quick">
      <button class="qbtn" onclick="qs('Cho anh mission hôm nay')">⚡ Mission</button>
      <button class="qbtn" onclick="showHWInChat()">📋 Bài mẹ gửi</button>
      <button class="qbtn" onclick="showShop()" style="border-color:var(--gold);">🪙 Đổi thưởng</button>
    </div>
    <div class="irow">
      <div class="ibox">
        <textarea id="txtIn" rows="1" placeholder="Báo cáo Fury..."></textarea>
      </div>
      <label class="abtn img">📸<input type="file" accept="image/*" style="display:none" onchange="onImg(this)"></label>
      <button class="abtn send" onclick="doSend()">➤</button>
    </div>
  </div>
</div>

<div class="overlay" id="parentOL">
  <div class="obox">
    <div style="display:flex;justify-content:space-between;margin-bottom:15px;">
      <div style="font-family:Rajdhani;font-weight:700;color:var(--gold);">📚 GỬI BÀI TẬP</div>
      <button onclick="document.getElementById('parentOL').style.display='none'">✕</button>
    </div>
    <textarea id="hwTA" style="width:100%;height:150px;background:#000;color:#fff;padding:10px;border-radius:8px;border:1px solid var(--bd2);"></textarea>
    <button onclick="sendHW()" style="width:100%;padding:10px;margin-top:10px;background:var(--blue);color:#fff;border:none;border-radius:8px;">LƯU BÀI TẬP</button>
  </div>
</div>

<script>
const K={api:'kua_key',xu:'kua_xu',mem:'kua_mem',hw:'kua_hw',room:'kua_room'};
let gemKey='', busy=false, imgData=null;

// --- HIỆU ỨNG SLOGAN & VOICE ---
const SLOGAN_TEXT = "SHIELD SYSTEMS ONLINE. STANDING BY!";
const SLOGAN_VOICE = "Shield systems online. Standing by!";

function animateSlogan(){
  const el = document.getElementById('sloganTxt');
  let i = 0;
  const timer = setInterval(() => {
    if(i < SLOGAN_TEXT.length){ el.textContent += SLOGAN_TEXT[i]; i++; }
    else{ clearInterval(timer); playVoice(); }
  }, 50);
}

function playVoice(){
  if(!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(SLOGAN_VOICE);
  u.lang = 'en-US'; u.rate = 0.85; u.pitch = 0.7;
  const voices = window.speechSynthesis.getVoices();
  const v = voices.find(v => v.lang.startsWith('en') && v.name.includes('Male')) || voices[0];
  if(v) u.voice = v;
  window.speechSynthesis.speak(u);
}

function hideSplash(){
  window.speechSynthesis.cancel();
  document.getElementById('splash').classList.add('hide');
  setTimeout(() => {
    document.getElementById('splash').remove();
    const key = localStorage.getItem(K.api);
    if(key){ gemKey=key; boot(); }
    else{ document.getElementById('setup').style.display='flex'; }
  }, 600);
}

// --- CORE SYSTEM (RECOVERED) ---
function M(){return JSON.parse(localStorage.getItem(K.mem)||'{"xp":0,"streak":1,"missions":0}');}
function getXu(){return parseInt(localStorage.getItem(K.xu)||'0');}
function addXu(n){const nw=getXu()+n;localStorage.setItem(K.xu,nw);updateUI();}

function boot(){
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('roomID').textContent = localStorage.getItem(K.room) || 'KUA-A5';
  updateUI();
  addAIMsg("Chào Agent Parker! Anh Fury đã sẵn sàng. Hôm nay em có bài tập gì không?");
}

function updateUI(){
  document.getElementById('xuVal').textContent = getXu();
  const m = M();
  document.getElementById('sStreak').textContent = m.streak;
  document.getElementById('sMission').textContent = m.missions;
}

// Giả lập gọi API (Bố sẽ dán Logic API thật của Claude vào đây nếu cần xử lý sâu)
async function doSend(){
  const inp = document.getElementById('txtIn');
  const txt = inp.value.trim();
  if((!txt && !imgData) || busy) return;
  addUserMsg(txt, imgData);
  inp.value = ''; imgData = null;
  busy = true;
  setTimeout(() => {
    addAIMsg("Anh đã nhận được báo cáo. Làm tốt lắm Peter! [+5 Xu]");
    addXu(5);
    busy = false;
  }, 1200);
}

function addUserMsg(txt, img){
  const msgs = document.getElementById('msgs');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="mb">${img?`<img src="${img}" style="max-width:100%;border-radius:8px;margin-bottom:5px;"><br>`:''}${txt}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addAIMsg(txt){
  const msgs = document.getElementById('msgs');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="mb">${txt}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function onImg(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => imgData = e.target.result;
  reader.readAsDataURL(file);
}

function showParent(){
  const pin = prompt("Nhập mã PIN Ba Mẹ:");
  if(pin === '2790') document.getElementById('parentOL').style.display='flex';
}

function sendHW(){
  const val = document.getElementById('hwTA').value;
  localStorage.setItem(K.hw, val);
  alert("Đã lưu bài tập cho Kua!");
  document.getElementById('parentOL').style.display='none';
}

function showHWInChat(){
  const hw = localStorage.getItem(K.hw) || "Chưa có bài tập nào.";
  addAIMsg("📋 BÀI TẬP CỦA EM:\n" + hw);
}

function qs(t){ document.getElementById('txtIn').value = t; doSend(); }

window.onload = () => {
  setTimeout(animateSlogan, 1000);
  if(window.speechSynthesis.onvoiceschanged !== undefined) {
    window.speechSynthesis.onvoiceschanged = playVoice;
  }
};
</script>
</body>
</html>
