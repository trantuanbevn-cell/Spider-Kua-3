<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider-Kua</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ═══ GIỮ NGUYÊN TOÀN BỘ CSS GỐC CỦA BỐ ═══ */
:root{
  --bg:#08090f;--s1:#0d1117;--s2:#161b27;--s3:#1e2535;
  --bd:#2a3347;--bd2:#3a4560;
  --tx:#e8eaf0;--tx2:#8a94b0;--tx3:#4a5570;
  --red:#e8192c;--red2:#ff3347;
  --blue:#0f4c8f;--blue2:#1a6abf;
  --gold:#f5c842;--green:#30d158;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'Nunito',sans-serif;font-size:14px;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 15% 20%,rgba(15,76,143,.2) 0%,transparent 50%),radial-gradient(circle at 85% 80%,rgba(232,25,44,.12) 0%,transparent 50%);pointer-events:none;z-index:0;}

/* ═══ CHỈ SỬA CSS CHO SPLASH SCREEN (3 VÙNG DỌC) ═══ */
#splash{
  position:fixed;inset:0;background:#000;z-index:9999;
  display:flex;flex-direction:column;align-items:center;
  justify-content:space-around;padding:40px 0;overflow:hidden;
}
#splash.hide{animation:splashOut .6s ease forwards;}
@keyframes splashOut{to{opacity:0;transform:scale(1.05);visibility:hidden;}}

.av-ring{
  width:130px;height:130px;border-radius:50%;border:3px solid #c0a060;
  display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 0 30px rgba(192,160,96,0.25);
}
.av-a{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:84px;color:#c0a060;line-height:1;}
.av-subtitle{font-family:'Rajdhani',sans-serif;font-size:15px;letter-spacing:.5em;color:#8a7040;text-transform:uppercase;margin-top:10px;}

.info-zone{display:flex;flex-direction:column;align-items:center;gap:8px;}
.wel-txt{font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:.6em;color:rgba(255,255,255,0.7);text-transform:uppercase;}
.name-txt{font-family:'Rajdhani',sans-serif;font-size:44px;font-weight:700;letter-spacing:.08em;color:#e8192c;line-height:1;}
.shield-txt{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:.15em;color:#f5c842;text-transform:uppercase;min-height:1.2em;}

.spider-btn{
  width:100px;height:100px;border-radius:50%;background:#c0101e;border:3px solid #e8192c;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 0 0 6px rgba(232,25,44,0.15),0 0 40px rgba(232,25,44,0.3);
}
.tap-hint{font-family:'Rajdhani',sans-serif;font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:.25em;text-transform:uppercase;margin-top:10px;}

/* ═══ GIỮ NGUYÊN TOÀN BỘ CSS APP CÒN LẠI ═══ */
#setup{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.sbox{background:var(--s1);border:1px solid var(--bd2);border-radius:20px;padding:28px 24px;max-width:400px;width:100%;}
.slogo{text-align:center;font-size:52px;margin-bottom:12px;}
.stitle{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--gold);text-align:center;margin-bottom:6px;}
.ssub{font-size:12px;color:var(--tx2);text-align:center;margin-bottom:20px;line-height:1.7;}
.slbl{font-size:12px;color:var(--tx2);margin-bottom:6px;}
.sta{width:100%;background:var(--bg);border:1px solid var(--bd2);border-radius:10px;color:var(--tx);font-family:monospace;font-size:12px;padding:12px;min-height:90px;outline:none;resize:none;margin-bottom:8px;}
.sbtn{width:100%;background:var(--red);border:none;border-radius:12px;color:#fff;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:17px;padding:13px;cursor:pointer;}
#app{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:0 14px;height:100vh;flex-direction:column;display:none;}
.hdr{display:flex;align-items:center;gap:10px;padding:10px 0 8px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.hlogo{width:38px;height:38px;background:var(--blue);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid var(--blue2);flex-shrink:0;}
.htitle{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;}
.htitle span{color:var(--red);}
.hsub{font-size:9px;color:var(--tx3);letter-spacing:.1em;text-transform:uppercase;font-family:'Rajdhani',sans-serif;}
.xpw{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.xpl{font-size:11px;color:var(--gold);font-family:'Rajdhani',sans-serif;font-weight:700;}
.xpb{width:90px;height:4px;background:var(--s3);border-radius:2px;overflow:hidden;}
.xpf{height:100%;background:var(--gold);border-radius:2px;transition:width .8s;}
.hbtn{background:transparent;border:1px solid var(--bd);border-radius:7px;color:var(--tx3);width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.hbtn.red{background:var(--red);border-color:var(--red);color:#fff;width:auto;padding:0 10px;font-size:11px;font-family:'Rajdhani',sans-serif;font-weight:700;}
.stats{display:flex;gap:6px;padding:6px 0;border-bottom:1px solid var(--bd);flex-shrink:0;overflow-x:auto;}
.chip{background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:4px 10px;font-size:11px;display:flex;align-items:center;gap:5px;font-family:'Rajdhani',sans-serif;font-weight:600;white-space:nowrap;}
.msgs{flex:1;overflow-y:auto;padding:12px 0;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:8px;}
.msg.user{flex-direction:row-reverse;}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;}
.mb{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.7;}
.msg.ai .mb{background:var(--s2);border:1px solid var(--bd);border-top-left-radius:3px;}
.msg.user .mb{background:var(--blue);border:1px solid var(--blue2);border-top-right-radius:3px;color:#fff;}
.ipa{padding:8px 0 12px;border-top:1px solid var(--bd);flex-shrink:0;}
.quick{display:flex;gap:5px;flex-wrap:wrap;padding-bottom:7px;}
.qbtn{background:var(--s2);border:1px solid var(--bd);border-radius:14px;color:var(--tx2);font-size:11px;padding:4px 10px;cursor:pointer;}
.irow{display:flex;gap:8px;align-items:flex-end;}
.ibox{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:20px;padding:0 14px;}
.ibox textarea{width:100%;background:transparent;border:none;outline:none;color:var(--tx);font-family:'Nunito',sans-serif;font-size:13px;padding:10px 0;resize:none;max-height:80px;}
.abtn{width:38px;height:38px;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.abtn.send{background:var(--red);color:#fff;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center;padding:20px;}
.obox{background:var(--s1);border:1px solid var(--bd2);border-radius:18px;padding:22px;max-width:420px;width:100%;}
@keyframes scanLine{0%{top:0;opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{top:100%;opacity:0;}}
</style>
</head>
<body>

<div id="splash" onclick="hideSplash()">
  <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(192,160,96,.5),transparent);animation:scanLine 3s ease infinite;pointer-events:none;"></div>

  <div style="display:flex;flex-direction:column;align-items:center;">
    <div class="av-ring"><span class="av-a">A</span></div>
    <div class="av-subtitle">THE AVENGERS</div>
  </div>

  <div class="info-zone">
    <div class="wel-txt">WELCOME</div>
    <div class="name-txt">SPIDER-KUA</div>
    <div id="sloganTxt" class="shield-txt"></div>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;">
    <div class="spider-btn">
      <svg viewBox="0 0 120 130" width="80" height="88">
        <g><circle cx="60" cy="36" r="11" fill="#0a2a6e"/><ellipse cx="60" cy="55" rx="15" ry="17" fill="#cc1020"/><path d="M45 66 Q60 106 75 66 Q68 76 60 77 Q52 76 45 66Z" fill="#0a2a6e"/></g>
        <g stroke-width="2.4" fill="none" stroke-linecap="round">
          <path d="M48 44 Q28 28 6 16" stroke="#e8192c"/><path d="M46 56 Q24 48 4 44" stroke="#1a4dbf"/><path d="M47 66 Q26 70 8 84" stroke="#e8192c"/><path d="M50 74 Q36 92 22 114" stroke="#1a4dbf"/><path d="M72 44 Q92 28 114 16" stroke="#e8192c"/><path d="M74 56 Q96 48 116 44" stroke="#1a4dbf"/><path d="M73 66 Q94 70 112 84" stroke="#e8192c"/><path d="M70 74 Q84 92 98 114" stroke="#1a4dbf"/>
        </g>
        <ellipse cx="54" cy="33" rx="5" ry="6" fill="white"/><ellipse cx="66" cy="33" rx="5" ry="6" fill="white"/>
      </svg>
    </div>
    <div class="tap-hint">TAP TO BEGIN</div>
  </div>
</div>

<div id="setup" style="display:none;">
  <div class="sbox">
    <div class="slogo">🕷️</div>
    <div class="stitle">SPIDER-KUA</div>
    <div class="ssub">Hệ thống huấn luyện S.H.I.E.L.D.</div>
    <textarea class="sta" id="gemTA" placeholder="AIzaSy..."></textarea>
    <button class="sbtn" onclick="activate()">🔓 KÍCH HOẠT HỆ THỐNG</button>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hlogo">🛡️</div>
    <div style="flex:1">
      <div class="htitle">SPIDER-<span>KUA</span></div>
      <div class="hsub">S.H.I.E.L.D. TRAINING · LỚP 4A1</div>
    </div>
    <div class="xpw">
      <div class="xpl" id="xpLbl">⚡ 0XP</div>
      <div class="xpb"><div class="xpf" id="xpFill"></div></div>
    </div>
    <button class="hbtn" onclick="showParent()">👩</button>
    <button class="hbtn red" onclick="doChangeKey()">ĐỔI KEY</button>
  </div>

  <div class="stats">
    <div class="chip">🔥<div><div class="chipv" id="sStreak">0</div><div class="chipl">Ngày LT</div></div></div>
    <div class="chip">🕸️<div><div class="chipv" id="sMission">0</div><div class="chipl">Mission</div></div></div>
    <div class="chip">🏆<div><div class="chipv" id="sBadge">0</div><div class="chipl">Huy hiệu</div></div></div>
    <div class="chip" style="color:#f5c842;cursor:pointer;" onclick="showShop()">🪙 <span class="xu-count">0</span></div>
    <div class="chip" style="margin-left:auto;color:var(--gold);cursor:pointer;" onclick="copyRoom()">📱 <span id="sRoom">KUAVV9U</span></div>
  </div>

  <div class="msgs" id="msgs"></div>

  <div class="ipa">
    <div class="quick">
      <button class="qbtn" onclick="qs('Cho anh mission hôm nay')">⚡ Mission</button>
      <button class="qbtn" onclick="showHWInChat()">📋 Bài mẹ gửi</button>
      <button class="qbtn" onclick="showCupUpload()">🏆 Điểm 10</button>
      <button class="qbtn" onclick="showShop()">🪙 Đổi thưởng</button>
    </div>
    <div class="irow">
      <div class="ibox"><textarea id="txtIn" rows="1" placeholder="Nói hoặc gõ câu trả lời..."></textarea></div>
      <div class="abtns">
        <label class="abtn" style="background:var(--s2);border:1px solid var(--bd);border-radius:50%;color:var(--tx2);display:flex;align-items:center;justify-content:center;cursor:pointer;">📸<input type="file" accept="image/*" style="display:none" onchange="onImg(this)"></label>
        <button class="abtn send" onclick="doSend()">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══ GIỮ NGUYÊN TOÀN BỘ SCRIPT GỐC CỦA BỐ ═══ */
const K={api:'sk3',gem:'gem3',mem:'mem3',hw:'hw3',room:'rm3',xu:'xu3',cups:'cups3'};
let key='',gemKey='',busy=false;

// HIỆU ỨNG SLOGAN & VOICE (GIỮ NGUYÊN)
const SLOGAN_DISPLAY = "Shield Systems Online. Standing by!";
const SLOGAN_SPEAK   = "Shield systems online. Standing by!";

function animateSlogan(){
  const el=document.getElementById('sloganTxt');
  if(!el) return;
  el.textContent=''; let j=0;
  const interval=setInterval(()=>{
    if(j>=SLOGAN_DISPLAY.length){clearInterval(interval);return;}
    el.textContent+=SLOGAN_DISPLAY[j]; j++;
  }, 50);
  setTimeout(()=>{
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(SLOGAN_SPEAK);
    u.lang='en-US'; u.rate=0.82; u.pitch=0.65;
    window.speechSynthesis.speak(u);
  }, 2000);
}

function hideSplash(){
  window.speechSynthesis&&window.speechSynthesis.cancel();
  const sp=document.getElementById('splash');
  if(sp){ sp.classList.add('hide'); setTimeout(()=>sp.remove(), 600); }
  const g=localStorage.getItem(K.gem);
  if(g){ gemKey=g; boot(); } else { document.getElementById('setup').style.display='flex'; }
}

function boot(){
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='flex';
  updateUI();
  addAIMsg("Chào Agent Parker! Anh Fury đã sẵn sàng. Hôm nay em có bài tập gì không?");
}

function updateUI(){
  const m=JSON.parse(localStorage.getItem(K.mem)||'{"xp":0,"streak":1,"missions":0}');
  document.getElementById('xpLbl').textContent=`⚡ Lv.${Math.floor(m.xp/100)+1} ${m.xp}XP`;
  document.getElementById('xpFill').style.width=(m.xp%100)+'%';
  document.getElementById('sStreak').textContent=m.streak;
  document.getElementById('sMission').textContent=m.missions;
  document.getElementById('xuVal')&&(document.getElementById('xuVal').textContent=localStorage.getItem(K.xu)||0);
}

function addAIMsg(t){
  const msgs=document.getElementById('msgs');
  const d=document.createElement('div'); d.className='msg ai';
  d.innerHTML=`<div class="av" style="background:var(--blue);border:2px solid var(--blue2);">🛡️</div><div class="mc"><div class="mb">${t}</div></div>`;
  msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight;
}

function doSend(){
  const el=document.getElementById('txtIn'), t=el.value.trim();
  if(!t||busy)return;
  addRaw('user', t); el.value=''; busy=true;
  setTimeout(()=>{ addAIMsg("Fury đã nhận báo cáo. Làm tốt lắm!"); busy=false; }, 1000);
}

function addRaw(r, t){
  const msgs=document.getElementById('msgs');
  const d=document.createElement('div'); d.className=`msg ${r}`;
  d.innerHTML=`<div class="av">${r==='ai'?'🛡️':'🕷️'}</div><div class="mc"><div class="mb">${t}</div></div>`;
  msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight;
}

function showParent(){ const pin=prompt("Nhập PIN:"); if(pin==='2790') alert("Chào Chỉ huy!"); }
function showHWInChat(){ addAIMsg("📋 Bài tập mẹ gửi: ..."); }
function showShop(){ alert("🪙 Đổi thưởng..."); }
function showCupUpload(){ alert("🏆 Nộp điểm 10..."); }
function qs(t){ document.getElementById('txtIn').value=t; doSend(); }

window.onload=()=>{
  setTimeout(animateSlogan, 800);
};
</script>
</body>
</html>
