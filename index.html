<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider-Kua v3 | S.H.I.E.L.D. Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090f;--s1:#0d1117;--s2:#161b27;--s3:#1e2535;
  --bd:#2a3347;--bd2:#3a4560;
  --tx:#e8eaf0;--tx2:#8a94b0;--tx3:#4a5570;
  --red:#e8192c;--red2:#ff3347;
  --blue:#0f4c8f;--blue2:#1a6abf;
  --gold:#f5c842;--green:#30d158;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'Nunito',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden;}

/* SPLASH SCREEN - THIẾT KẾ MỚI CỦA GEMINI */
#splash{
  position:fixed;inset:0;background:var(--bg);z-index:9999;
  display:flex;flex-direction:column;align-items:center;
  justify-content:space-evenly; /* Giãn cách đều 3 vùng dọc */
  padding:40px 0;text-align:center;
}
#splash.hide{animation:splashOut .6s ease forwards;}
@keyframes splashOut{to{opacity:0;transform:scale(1.05);visibility:hidden;}}

/* Vùng 1: Logo Avengers */
.av-zone{display:flex;flex-direction:column;align-items:center;}
.av-ring{
  width:120px;height:120px;border-radius:50%;border:3px solid #c0a060;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 30px rgba(192,160,96,0.3);position:relative;
}
.av-a{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:80px;color:#c0a060;line-height:1;}
.av-sub{font-family:'Rajdhani',sans-serif;font-size:14px;letter-spacing:.5em;color:#8a7040;text-transform:uppercase;margin-top:15px;}

/* Vùng 2: Welcome Text - Căn đối 3 dòng */
.info-zone{display:flex;flex-direction:column;gap:15px;align-items:center;}
.wel-txt{font-family:'Rajdhani',sans-serif;font-size:16px;letter-spacing:0.7em;color:rgba(255,255,255,0.6);text-transform:uppercase;}
.name-txt{font-family:'Rajdhani',sans-serif;font-size:52px;font-weight:700;letter-spacing:0.1em;color:var(--red);text-shadow:0 0 25px rgba(232,25,44,0.5);line-height:1;}
.shield-txt{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;letter-spacing:0.2em;color:var(--gold);text-shadow:0 0 15px rgba(245,200,66,0.4);}

/* Vùng 3: Spider Logo & Tap */
.spider-zone{display:flex;flex-direction:column;align-items:center;gap:25px;}
.spider-btn{
  width:160px;height:160px;cursor:pointer;transition:transform 0.3s;
  display:flex;align-items:center;justify-content:center;position:relative;
}
.spider-btn:active{transform:scale(0.9);}
.spider-img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 20px rgba(232,25,44,0.6));}
.tap-txt{font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:0.4em;color:rgba(255,255,255,0.3);text-transform:uppercase;animation:blink 2s infinite;}

@keyframes blink{0%,100%{opacity:0.2;}50%{opacity:0.7;}}

/* APP INTERFACE */
#app{display:none;max-width:860px;margin:0 auto;padding:0 14px;height:100vh;flex-direction:column;}
#setup{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.sbox{background:var(--s1);border:1px solid var(--bd2);border-radius:20px;padding:28px 24px;max-width:400px;width:100%;}
.slogo{text-align:center;font-size:52px;margin-bottom:12px;}
.stitle{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--gold);text-align:center;margin-bottom:6px;}
.ssub{font-size:12px;color:var(--tx2);text-align:center;margin-bottom:20px;line-height:1.7;}
.slbl{font-size:12px;color:var(--tx2);margin-bottom:6px;}
.sta{width:100%;background:var(--bg);border:1px solid var(--bd2);border-radius:10px;color:var(--tx);font-family:monospace;font-size:12px;padding:12px;min-height:90px;outline:none;resize:none;margin-bottom:8px;}
.sbtn{width:100%;background:var(--red);border:none;border-radius:12px;color:#fff;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:17px;padding:13px;cursor:pointer;}
.serr{font-size:12px;color:var(--red2);text-align:center;margin-top:10px;}

/* HEADER & CHAT */
.hdr{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd);flex-shrink:0;}
.hlogo{width:38px;height:38px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid var(--blue2);}
.htitle{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;}
.htitle span{color:var(--red);}
.stats{display:flex;gap:6px;padding:6px 0;border-bottom:1px solid var(--bd);overflow-x:auto;}
.chip{background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:4px 10px;font-size:11px;display:flex;align-items:center;gap:5px;font-family:'Rajdhani',sans-serif;font-weight:600;}
.msgs{flex:1;overflow-y:auto;padding:12px 0;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:8px;max-width:85%;}
.msg.ai{align-self:flex-start;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.mb{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.6;}
.msg.ai .mb{background:var(--s2);border:1px solid var(--bd);border-top-left-radius:2px;}
.msg.user .mb{background:var(--blue);color:#fff;border-top-right-radius:2px;}

.ipa{padding:10px 0;border-top:1px solid var(--bd);flex-shrink:0;}
.irow{display:flex;gap:8px;align-items:flex-end;}
.ibox{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:20px;padding:0 14px;}
.ibox textarea{width:100%;background:transparent;border:none;outline:none;color:var(--tx);padding:10px 0;resize:none;max-height:80px;}
.abtn{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}
.abtn.send{background:var(--red);color:#fff;}
</style>
</head>
<body>

<div id="splash">
  <div class="av-zone">
    <div class="av-ring"><span class="av-a">A</span></div>
    <div class="av-sub">THE AVENGERS</div>
  </div>

  <div class="info-zone">
    <div class="wel-txt">WELCOME</div>
    <div class="name-txt">SPIDER-KUA</div>
    <div class="shield-txt">SHIELD SYSTEMS ONLINE. STANDING BY!</div>
  </div>

  <div class="spider-zone">
    <div class="spider-btn" onclick="hideSplash()">
      <img src="https://raw.githubusercontent.com/trantuanbevn-cell/Spider-Kua-3/main/Spider-Man-Logo-PNG-Isolated-HD.png" class="spider-img" alt="Spider Logo">
    </div>
    <div class="tap-txt">TAP TO BEGIN</div>
  </div>
</div>

    <div class="slbl">Google Gemini API Key:</div>
    <textarea class="sta" id="gemTA" placeholder="AIzaSy..."></textarea>
    <button class="sbtn" onclick="activate()">🔓 UN
