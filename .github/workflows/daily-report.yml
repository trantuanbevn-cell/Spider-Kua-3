name: Bao cao 23h dem

on:
  schedule:
    - cron: '0 16 * * *'   # 16:00 UTC = 23:00 Viet Nam
  workflow_dispatch:        # cho phep bam chay thu bang tay

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Tong hop va gui Telegram
        env:
          SB_URL: ${{ secrets.SB_URL }}
          SB_KEY: ${{ secrets.SB_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
          ROOM: ${{ secrets.ROOM }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, datetime

          SB_URL=os.environ['SB_URL'].rstrip('/')
          SB_KEY=os.environ['SB_KEY']
          TG=os.environ['TG_TOKEN']
          CHAT=os.environ['TG_CHAT']
          ROOM=os.environ['ROOM']

          # ngay hom nay theo gio Viet Nam (UTC+7)
          now_vn = datetime.datetime.utcnow() + datetime.timedelta(hours=7)
          day = now_vn.strftime('%Y-%m-%d')

          req = urllib.request.Request(
            f"{SB_URL}/rest/v1/study_log?room_code=eq.{ROOM}&day=eq.{day}&select=data",
            headers={'apikey': SB_KEY, 'Authorization': f'Bearer {SB_KEY}'})
          try:
            rows = json.load(urllib.request.urlopen(req, timeout=20))
          except Exception as e:
            rows = None

          d = now_vn.strftime('%d/%m')
          if rows is None:
            msg = f"⚠️ Báo cáo {d}: không đọc được dữ liệu học (kiểm tra Supabase)."
          elif not rows:
            msg = f"🔴 TỔNG KẾT {d}: Hôm nay con CHƯA HỌC buổi nào trên Spider-Kua."
          else:
            ss = [r['data'] for r in rows if r.get('data')]
            ok = sum(s.get('ok',0) for s in ss)
            tot = sum(s.get('tot',0) for s in ss)
            xu = sum(s.get('xu',0) for s in ss)
            mins = sum(max(1, round((s.get('e',0)-s.get('d',0))/60000)) for s in ss)
            pct = round(ok/tot*100) if tot else 0
            lines = [f"🟢 TỔNG KẾT {d}: {len(ss)} buổi · ~{mins} phút · đúng {ok}/{tot} câu ({pct}%) · +{xu} xu"]
            for s in ss[:5]:
              t1 = datetime.datetime.fromtimestamp(s.get('d',0)/1000, datetime.timezone(datetime.timedelta(hours=7))).strftime('%H:%M')
              kind = {'daily':'Nhiệm vụ ngày','review':'Ôn lỗi sai'}.get(s.get('kind'),'Tự luyện')
              p = round(s.get('ok',0)/s.get('tot',1)*100)
              lines.append(f"  • {t1} · {kind} · {s.get('ok',0)}/{s.get('tot',0)} ({p}%)")
            nx = next((s.get('nhanXet') for s in reversed(ss) if s.get('nhanXet')), '')
            if nx: lines.append(f"🛡️ Fury: {nx}")
            msg = "\n".join(lines)

          body = json.dumps({'chat_id': CHAT, 'text': msg}).encode()
          urllib.request.urlopen(urllib.request.Request(
            f"https://api.telegram.org/bot{TG}/sendMessage",
            data=body, headers={'Content-Type':'application/json'}), timeout=20)
          print("Da gui:", msg[:80])
          PYEOF
